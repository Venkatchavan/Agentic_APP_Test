      #     script: |
      #       cd /opt/agentic-app
      #       git pull origin main
      #       docker-compose pull
      #       docker-compose up -d --build backend
      #       docker-compose exec -T backend alembic upgrade head

      # OPTION B: Push to Docker Hub, pull on server
