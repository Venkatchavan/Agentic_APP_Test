name: CD — Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/cd.yml"

jobs:
  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t agentic-app-backend:${{ github.sha }} ./backend
          docker tag agentic-app-backend:${{ github.sha }} agentic-app-backend:latest

      # ── Uncomment and configure one of these deploy targets ──────────────────

